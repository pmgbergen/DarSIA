[id]
comment = "Intro session based on glass beads experiments"

[data]
folder = "..."            # Folder with images
format = "JPG"            # The format of the images
pad = 5                   # number of relevant digits in image names, e.g. 00001.JPG
baseline = "baseline.JPG" # The baseline image
results = "..."           # Main output folder

[specs]
dim = 2         # dimension of the model
width = 2.745   # width of the model in m
height = 1.5    # height of the model in m
porosity = 0.44 # porosity of the medium

[depth]
measurements = "./data/depth_measurements.csv"
depth_map = "./data/depth_map.npz"

[protocols]
injection = ["./data/protocol.xlsx", "injection"]
imaging = ["./data/protocol.xlsx", "imaging"]
pressure_temperature = ["./data/protocol.xlsx", "pressure_temperature"]

[labeling]
colored_image = "./data/segmented_baseline.png"
labels = "./data/labels.npz"
water_label = 0

[curvature.init]
horizontal_bulge = 1e-9
vertical_bulge = 0.0
[curvature.crop]
pts_src = [[381, 158], [4920, 137], [4938, 7732], [425, 7734]]
width = 2.745
height = 1.5
[curvature.bulge]
horizontal_bulge = -1.3244902496792662e-09
vertical_bulge = -4.637586886784494e-09
horizontal_center_offset = 153
vertical_center_offset = -342
[curvature.stretch]
horizontal_stretch = -3.606015332647378e-09
horizontal_center_offset = -579
vertical_stretch = -0.0
vertical_center_offset = 405

[color_paths]
# Basis for calibration label-space: "labels" (default) or "facies".
# - facies: coarse geological regions
# - labels: fine segmentation labels
basis = "labels"
ignore_labels = [0, 1]
resolution = [51, 51, 51]
threshold_baseline = 0.0
threshold_calibration = 1e-3
baseline_images = ["...", "...", "..."]
calibration_images = ["...", "...", "..."]
# If omitted, defaults to results/calibration/color_paths/from_<basis>
calibration_file = "./data/color_paths"
reference_label = 3

[color_signal]
num_clusters = 2
calibration_images = ["...", "...", "..."]
calibration_file = "./data/color_signal.json"
analysis_times = [1, 5, 10, 20, 21, 40]

[mass]
calibration_image_times = [1, 5, 10, 20]
calibration_file = "./data/mass_calibration.json"

[color_to_mass]
# Keep this aligned with [color_paths].basis.
basis = "labels"
# Label sensitivity threshold for deactivating insensitive color paths.
threshold = 0.2
# If omitted, defaults to results/calibration/color_to_mass/from_<basis>
# calibration_folder = "./data/color_to_mass"

[analysis.cropping]
image_times = [1, 5, 10, 20, 21, 40]
formats = ["npz", "jpg"]
[analysis.color_signal]
image_times = [1, 5, 10, 20, 21, 40]
[analysis.mass]
image_times = [1, 5, 10, 20, 21, 40]
[analysis.thresholding]
# Optional thresholding with per-layer styling and separate format outputs.
formats = ["jpg", "npz"]
[analysis.thresholding.layers.gas]
mode = "saturation_g"
threshold = 0.05
label = "Gas plume"
fill = [255, 0, 0]
stroke = [255, 255, 255]
fill_alpha = 0.35
stroke_width = 2
[analysis.thresholding.layers.aq]
mode = "concentration_aq"
threshold = 0.05
label = "Aqueous plume"
fill = [0, 0, 255]
stroke = [255, 255, 255]
fill_alpha = 0.35
stroke_width = 2
[analysis.thresholding.legend]
show = true
font_scale = 0.7
thickness = 2
position = [20, 20]
text_color = [255, 255, 255]
box_enabled = true
box_color = [0, 0, 0]
box_alpha = 0.4
box_padding = 10

[video]

[video.source]
folder = "segmentation" # required; relative to [data.results] when not absolute
#extensions = [".jpg", ".png"]
#pattern = "*.png"
#recursive = false

[video.output]
formats = ["mp4", "gif"]
fps = 6.0
# resolution = [1280, 720] # optional [width, height]
# filename = "video" # optional
codec = "mp4v"
quality = 95

[video.overlay]
show_elapsed_time = true
elapsed_time_format = "Elapsed: {:.2f} h"
show_note = true
note = "Experiment #1 - Segmentation"
font_scale = 1.5
thickness = 2
text_color = [255, 255, 255]
position = [20, 20]
box_enabled = true
box_color = [0, 0, 0]
box_alpha = 0.4
box_padding = 10
