[id]
comment = "Intro session based on glass beads experiments"

[data]
folder = "..."            # Folder with images
## folders = ["...", "..."] # Optional multi-folder input; requires [protocols.imaging] table
format = "JPG"            # The format of the images
pad = 5                   # number of relevant digits in image names, e.g. 00001.JPG
baseline = "baseline.JPG" # The baseline image
results = "..."           # Main output folder

[data.path.baseline_imgs]
paths = ["img1.jpg", "img2.jpg", "img3.jpg"]

[data.path.calibration_imgs]
paths = ["img1.jpg", "img2.jpg", "img3.jpg"]

[data.time.analysis_imgs]
times = ["01:00:00", "01:05:00", "01:10:00", "01:20:00", "01:21:00", "01:40:00"]

[data.interval.analysis_imgs2]
start = "01:00:00"
end = "02:00:00"
num = 10
tol = "00:10:00"

[specs]
dim = 2         # dimension of the model
width = 2.745   # width of the model in m
height = 1.5    # height of the model in m
porosity = 0.44 # porosity of the medium

[depth]
measurements = "./data/depth_measurements.csv"
depth_map = "./data/depth_map.npz"

[protocols]
injection = "./data/injection_protocol.csv"
imaging = "./data/imaging_protocol.csv"
# For multi-folder [data].folders, use:
# [protocols.imaging]
# "/abs/path/to/folder_a" = "./data/imaging_protocol_a.csv"
# "/abs/path/to/folder_b" = ["./data/imaging_protocol_b.xlsx", "Sheet1"]
pressure_temperature = "./data/pressure_temperature_protocol.csv"
imaging_mode = "exif"

[labeling]
colored_image = "./data/segmented_baseline.png"
labels = "./data/labels.npz"
water_label = 0

[curvature.init]
horizontal_bulge = 1e-9
vertical_bulge = 0.0
[curvature.crop]
pts_src = [[381, 158], [4920, 137], [4938, 7732], [425, 7734]]
width = 2.745
height = 1.5
[curvature.bulge]
horizontal_bulge = -1.3244902496792662e-09
vertical_bulge = -4.637586886784494e-09
horizontal_center_offset = 153
vertical_center_offset = -342
[curvature.stretch]
horizontal_stretch = -3.606015332647378e-09
horizontal_center_offset = -579
vertical_stretch = -0.0
vertical_center_offset = 405

[color.path.my_colorpath]
mode = "relative" # or "absolute"
basis = "labels"  # or "facies"; "single" is not implemented for color path
ignore_labels = [0, 1]
resolution = 51
threshold_baseline = 0.0
threshold_calibration = 1e-3
baseline = "baseline_imgs"
data = "calibration_imgs"
reference_label = 3

[color_signal]
num_clusters = 2
calibration_images = ["...", "...", "..."]
calibration_file = "./data/color_signal.json"
analysis_times = [1, 5, 10, 20, 21, 40]

[mass]
calibration_image_times = [1, 5, 10, 20]
calibration_file = "./data/mass_calibration.json"

[color.channel.red_channel]
mode = "absolute"
basis = "single" # labels/facies currently not implemented for channel embedding
color_space = "RGB"
channel = "r"

[color.range.custom_range]
mode = "absolute"
basis = "single" # labels/facies currently not implemented for range embedding
color_space = "HSV"
range = [[0.2, 0.4], [0.5, "none"], [0.8, "none"]]

[calibration.color]
color = "my_colorpath"

[calibration.mass]
color = "my_colorpath"
threshold = 0.2
data = "calibration_imgs"

[analysis]
data = "analysis_imgs"
formats = ["npz_default", "jpg_preview"]

[format.npz.npz_default]
# resolution = [500, 1000]
# keep_ratio = true
# dtype = "np.float32"

[format.jpg.jpg_preview]
# resolution = [2160, 4096]
# cmap = "matplotlib.viridis"

[analysis.cropping]
formats = ["npz", "jpg"]

[analysis.color_signal]
data = "analysis_imgs"

[analysis.mass]
color = "my_colorpath"

[analysis.expert_knowledge]
# Optional ROI constraints (keys from top-level [roi.*]).
# Defaults are empty lists (strict no-op).
# saturation_g = ["roi_key_1", "roi_key_2"]
# concentration_aq = ["roi_key_3"]

[helper.roi]
# mode: none (default), concentration_aq, saturation_g, mass/mass_total,
# mass_g, mass_aq, rescaled_mass, rescaled_saturation_g, rescaled_concentration_aq
mode = "none"
data = "analysis_imgs"

[helper.roi_viewer]
# ROI Viewer data selection. Supports `all` / `none` / single ROI key selector in UI.
data = "analysis_imgs"

[helper.results]
# ResultReader input selection from [data.*] registry.
data = "analysis_imgs"
# Any scalar result folder produced by mass analysis (e.g. rescaled_mass, mass, ...)
mode = "rescaled_mass"
# Either direct type (csv/npz) or a [format.*.*] registry key resolving to csv/npz.
format = "csv"
# Optional colormap (matplotlib.<name> or color_path.from_<basis>.<label>)
# cmap = "matplotlib.viridis"
# Optional ROI keys from top-level [roi.*]; when omitted, full image is used.
# roi = ["main"]

#[helper]
# Shorthand for ROI Viewer:
# data = ["analysis_imgs"]

[analysis.thresholding]
# Optional thresholding with per-layer styling and separate format outputs.
# Supported layer modes:
# concentration_aq, saturation_g, mass_total, mass_g, mass_aq,
# rescaled_mass, rescaled_saturation_g, rescaled_concentration_aq,
# color.<id>
formats = ["jpg", "npz"]
[analysis.thresholding.layers.gas]
mode = "saturation_g"
threshold_min = 0.05
#threshold_max = 0.15
label = "Gas plume"
fill = [255, 0, 0]
stroke = [255, 255, 255]
fill_alpha = 0.35
stroke_width = 2
[analysis.thresholding.layers.aq]
mode = "concentration_aq"
threshold_min = 0.05
#threshold_max = 1.0
label = "Aqueous plume"
fill = [0, 0, 255]
stroke = [255, 255, 255]
fill_alpha = 0.35
stroke_width = 2
[analysis.thresholding.layers.red]
mode = "color.red_channel"
threshold_min = 0.6
label = "High red channel"
fill = [255, 255, 0]
stroke = [255, 255, 255]
fill_alpha = 0.2
stroke_width = 1
[analysis.thresholding.layers.green_hsv_band]
mode = "color.custom_range"
threshold_min = 0.5
label = "HSV green range"
fill = [0, 255, 0]
stroke = [255, 255, 255]
fill_alpha = 0.2
stroke_width = 1
[analysis.thresholding.legend]
show = true
font_scale = 0.7
thickness = 2
position = [20, 20]
text_color = [255, 255, 255]
box_enabled = true
box_color = [0, 0, 0]
box_alpha = 0.4
box_padding = 10

# Optional segmentation contours (single entry example):
#[analysis.segmentation]
#label = "CO2 contour"
#mode = "rescaled_mass" # also supports mass, saturation_g, concentration_aq, rescaled_*
#thresholds = [0.01, 0.03, 0.05]
#color = [255, 0, 0]
#alpha = [1.0, 1.0, 1.0]

[video]

[video.source]
folder = "segmentation" # required; relative to [data.results] when not absolute
#extensions = [".jpg", ".png"]
#pattern = "*.png"
#recursive = false

[video.output]
formats = ["mp4", "gif"]
fps = 6.0
# resolution = [1280, 720] # optional [width, height]
# filename = "video" # optional
codec = "mp4v"
quality = 95

[video.overlay]
show_elapsed_time = true
elapsed_time_format = "Elapsed: {:.2f} h"
show_note = true
note = "Experiment #1 - Segmentation"
font_scale = 1.5
thickness = 2
text_color = [255, 255, 255]
position = [20, 20]
box_enabled = true
box_color = [0, 0, 0]
box_alpha = 0.4
box_padding = 10
