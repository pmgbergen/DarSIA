name: Documentation

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install dependencies
        run: |
          pip install sphinx pydata_sphinx_theme
          pip install .

      - name: Build Documentation
        run: sphinx-build -b html docs/ docs/_build/html