name: Build test

on:
  push:
    branches:
     - main
  pull_request:
    branches:
     - main

#  schedule:
    # Do a nightly run of the tests
#    - cron: '0 1 * * *'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # https://help.github.com/en/actions/language-and-framework-guides/using-python-with-github-actions#specifying-a-python-version
    strategy:
      matrix:
        python-version:  ["3.12"]
      # Complete all versions in matrix even if one fails.
      fail-fast: false

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
    - uses: actions/checkout@v2

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version}}

    - name: Install DarSIA
      run: uv sync --extra dev

    - name: black
      if: ${{ always() }}
      run: uv run black --check src

    - name: flake8
      if: ${{ always() }}
      run: uv run flake8 src

    # - name: mypy
    #   if: ${{ always() }}
    #   run: uv run mypy src

    - name: isort
      if: ${{always()}}
      run: uv run isort --check src

    - name: pytest
      if: ${{always()}}
      run: uv run pytest