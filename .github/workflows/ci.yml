name: Build test

on:
  push:
    branches:
     - main

#  schedule:
    # Do a nightly run of the tests
#    - cron: '0 1 * * *'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build-with-petsc:
    runs-on: ubuntu-latest

    # https://help.github.com/en/actions/language-and-framework-guides/using-python-with-github-actions#specifying-a-python-version
    strategy:
      matrix:
        python-version:  ["3.12"]
      # Complete all versions in matrix even if one fails.
      fail-fast: false

    steps:
    - uses: actions/checkout@v2

    - name: Setup Python ${{ matrix.python-version}}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version}}
        architecture: x64

    - name: Install petsc dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libhypre-dev libmumps-seq-dev
        pip install numpy mpi4py
        PETSC_CONFIGURE_OPTIONS="--download-hypre --download-mumps --download-parmetis --download-ml --download-metis --download-scalapack" pip install petsc petsc4py

    - name: Install DarSIA
      run: pip install .[dev]

    - name: black
      if: ${{ always() }}
      run: black --check src

    - name: flake8
      if: ${{ always() }}
      run: flake8 src

    # - name: mypy
    #   if: ${{ always() }}
    #   run: mypy src

    - name: isort
      if: ${{always()}}
      run: isort --check src

    - name: pytest
      if: ${{always()}}
      run: pytest

  build-without-petsc:
    runs-on: ubuntu-latest

    # https://help.github.com/en/actions/language-and-framework-guides/using-python-with-github-actions#specifying-a-python-version
    strategy:
      matrix:
        python-version:  ["3.12"]
      # Complete all versions in matrix even if one fails.
      fail-fast: false

    steps:
    - uses: actions/checkout@v2

    - name: Setup Python ${{ matrix.python-version}}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version}}
        architecture: x64

    - name: Install DarSIA
      run: pip install .[dev]

    - name: black
      if: ${{ always() }}
      run: black --check src

    - name: flake8
      if: ${{ always() }}
      run: flake8 src

    # - name: mypy
    #   if: ${{ always() }}
    #   run: mypy src

    - name: isort
      if: ${{always()}}
      run: isort --check src

    - name: pytest
      if: ${{always()}}
      run: pytest